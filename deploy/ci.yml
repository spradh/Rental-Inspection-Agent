# GitHub Actions CI/CD for the BI Analyst Agent.
#
# OPTIONAL for this course. You only need this if you push the repo to YOUR OWN GitHub
# repo and want automation. The `quality` job below also runs locally with `make ci`
# (no GitHub needed), and deploying is a one-line `gcloud run deploy` (see README.md) —
# so nothing here is required to complete the labs.
#
# To adopt: copy to .github/workflows/ci.yml in your fork, then set repo secrets:
#   ANTHROPIC_API_KEY    - provider key for the eval judge/agent (quality job)
#   GCP_WIF_PROVIDER     - Workload Identity Federation provider resource name (deploy job)
#   GCP_SERVICE_ACCOUNT  - deploy service account email                       (deploy job)
# and replace PROJECT/REGION below.

name: ci

on:
  pull_request:
  push:
    branches: [main]

env:
  REGION: us-central1
  PROJECT: PROJECT            # TODO: your GCP project id
  SERVICE: bi-agent

jobs:
  # ── Quality gate: runs on every PR. The valuable, always-on half. ──
  # Mirrors `make ci`. No cloud credentials needed — evals run on the SQLite backend.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check project shared data   # the deployable surface
      - name: Generate dataset (needed by evals)
        run: uv run python -m data.generate
      - name: Run evals (gates the merge)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # Exits non-zero below the pass-rate threshold, failing the PR.
        run: uv run python -m project.eval.run

  # ── Deploy: optional, only on merge to main in your own repo. ──
  # Skip it and nothing breaks — the manual `gcloud run deploy` in README.md is the
  # supported path for coursework. This just automates the same command.
  deploy:
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # keyless auth to GCP (Workload Identity Federation)
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Deploy to Cloud Run
        # Same one command as the manual runbook; Cloud Build builds the root Dockerfile.
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "$PROJECT" \
            --region "$REGION" \
            --service-account "bi-agent@${PROJECT}.iam.gserviceaccount.com" \
            --set-env-vars "BIGQUERY_PROJECT=${PROJECT},BIGQUERY_DATASET=loomco,RELEASE=${{ github.sha }}" \
            --update-secrets "ANTHROPIC_API_KEY=anthropic-key:latest" \
            --memory 2Gi --timeout 300 --allow-unauthenticated
